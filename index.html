<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 Ruleta Digital - Selector de Ganadores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .logo-header {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 2;
        }

        .logo {
            width: 90px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
        }

        .dedication {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            margin-top: -5px;
            margin-bottom: 12px;
            font-size: 0.75em;
            font-style: italic;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 25px;
            font-size: 0.7em;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px 20px;
            box-shadow: 0 6px 24px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
            margin: 10px auto;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            font-size: 1.6em;
            font-weight: 900;
            letter-spacing: -1px;
            filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.4));
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            font-size: 0.75em;
            font-weight: 400;
        }

        .input-section {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 140px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 13px;
            color: white;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="text"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #667eea;
            box-shadow: 0 0 12px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        button {
            padding: 8px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .participants-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
            min-height: 30px;
            max-height: 100px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .participants-list::-webkit-scrollbar {
            width: 4px;
        }

        .participants-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .participant-tag {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 5px 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .remove-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .wheel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
            position: relative;
        }

        .wheel-wrapper {
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 10px 30px rgba(102, 126, 234, 0.4));
        }

        #wheelCanvas {
            border-radius: 50%;
            transition: transform 0.1s;
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        .arrow {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 25px solid #f5576c;
            filter: drop-shadow(0 4px 10px rgba(245, 87, 108, 0.6));
            z-index: 10;
        }

        .spin-button {
            display: block;
            margin: 0 auto;
            padding: 12px 35px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
            text-transform: uppercase;
        }

        .spin-button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.5);
        }

        .winner-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .winner-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 30px 25px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
            width: 80%;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .winner-content h2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: 900;
        }

        .winner-name {
            font-size: 2.2em;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            margin: 15px 0;
            filter: drop-shadow(0 4px 10px rgba(245, 87, 108, 0.4));
        }

        .close-btn {
            margin-top: 15px;
            padding: 10px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .logo-header { position: relative; top: 0; left: 0; text-align: center; margin-bottom: 10px; }
            .logo { width: 70px; }
            h1 { font-size: 1.4em; }
            .container { padding: 15px 12px; margin-top: 5px; max-width: 95%; }
            #wheelCanvas { width: 240px !important; height: 240px !important; }
            .winner-name { font-size: 1.8em; }
            .winner-content { padding: 25px 20px; width: 90%; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="logo-header">
        <img src="assets/img/Jhiros_New_SFBN.png" alt="Logo JHIROS" class="logo">
    </div>
    <div class="container">
        <h1>🎡 Ruleta Digital</h1>
        <p class="dedication">Para la Dra. Maribel Aguirre</p>
        <p class="subtitle">¡Agrega nombres y gira!</p>
        <div class="input-section">
            <input type="text" id="participantInput" placeholder="Nombre..." onkeypress="if(event.key==='Enter') addParticipant()">
            <button onclick="addParticipant()">➕</button>
        </div>
        <div class="participants-list" id="participantsList"></div>
        <div class="wheel-container">
            <div class="wheel-wrapper">
                <div class="arrow"></div>
                <canvas id="wheelCanvas" width="280" height="280"></canvas>
            </div>
        </div>
        <button class="spin-button" id="spinBtn" onclick="spinWheel()" disabled>🎯 ¡GIRAR!</button>
        <footer class="footer">&copy; 2026 Jhiro's Edu | Todos los derechos reservados</footer>
    </div>

    <div class="winner-modal" id="winnerModal">
        <div class="winner-content">
            <h2>🎉 ¡Ganador(a)! 🎉</h2>
            <div class="winner-name" id="winnerName"></div>
            <button class="close-btn" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <!-- Audios -->
    <audio id="tickSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

    <script>
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 40 + 10 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 8 + 8) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        let participants = [];
        let isSpinning = false;
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const colors = ['#FF6B9D', '#C44569', '#FFA502', '#FFC312', '#12CBC4', '#1289A7', '#5F27CD', '#341F97', '#00D2FF', '#3742FA', '#2ED573', '#FF4757'];
        
        const tickSound = document.getElementById('tickSound');
        const winSound = document.getElementById('winSound');
        let lastSegmentIndex = -1;

        function addParticipant() {
            const input = document.getElementById('participantInput');
            const name = input.value.trim();
            if (name && !participants.includes(name)) {
                participants.push(name);
                input.value = '';
                updateParticipantsList();
                drawWheel();
                updateSpinButton();
            }
        }

        function removeParticipant(index) {
            participants.splice(index, 1);
            updateParticipantsList();
            drawWheel();
            updateSpinButton();
        }

        function updateParticipantsList() {
            const list = document.getElementById('participantsList');
            list.innerHTML = '';
            participants.forEach((name, index) => {
                const tag = document.createElement('div');
                tag.className = 'participant-tag';
                tag.innerHTML = `<span>${name}</span><button class="remove-btn" onclick="removeParticipant(${index})">✕</button>`;
                list.appendChild(tag);
            });
        }

        function updateSpinButton() {
            document.getElementById('spinBtn').disabled = participants.length < 2;
        }

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 125;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (participants.length === 0) {
                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
                gradient.addColorStop(0, 'rgba(102, 126, 234, 0.2)');
                gradient.addColorStop(1, 'rgba(118, 75, 162, 0.2)');
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = gradient;
                ctx.fill();
                return;
            }
            const anglePerSegment = (2 * Math.PI) / participants.length;
            participants.forEach((name, index) => {
                const startAngle = index * anglePerSegment;
                const endAngle = startAngle + anglePerSegment;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[index % colors.length];
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px Poppins';
                ctx.fillText(name, radius - 10, 4);
                ctx.restore();
            });
            ctx.beginPath();
            ctx.arc(centerX, centerY, 15, 0, 2 * Math.PI);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#667eea';
            ctx.fill();
        }

        function spinWheel() {
            if (isSpinning || participants.length < 2) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            const spinDuration = 5000;
            const spinRotations = 8 + Math.random() * 5;
            const totalRotationDeg = spinRotations * 360 + Math.random() * 360;
            const startTime = Date.now();
            lastSegmentIndex = -1;

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinDuration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4);
                const currentRotationDeg = totalRotationDeg * easeOut;
                canvas.style.transform = `rotate(${currentRotationDeg}deg)`;

                const anglePerSegmentDeg = 360 / participants.length;
                const currentSegmentIndex = Math.floor(((270 - (currentRotationDeg % 360) + 360) % 360) / anglePerSegmentDeg);
                if (currentSegmentIndex !== lastSegmentIndex) {
                    tickSound.currentTime = 0;
                    tickSound.play().catch(() => {});
                    lastSegmentIndex = currentSegmentIndex;
                }

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    const finalRotationDeg = currentRotationDeg % 360;
                    const adjustedAngleDeg = (270 - finalRotationDeg + 360) % 360;
                    const winnerIndex = Math.floor(adjustedAngleDeg / anglePerSegmentDeg) % participants.length;
                    showWinner(participants[winnerIndex]);
                    isSpinning = false;
                    document.getElementById('spinBtn').disabled = false;
                }
            }
            animate();
        }

        function showWinner(name) {
            winSound.play().catch(() => {});
            setTimeout(() => {
                document.getElementById('winnerName').textContent = name;
                document.getElementById('winnerModal').style.display = 'flex';
                createConfetti();
            }, 500);
        }

        function closeModal() { document.getElementById('winnerModal').style.display = 'none'; }
        drawWheel();
    </script>
</body>
</html>
